<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HVAC Leads 2009-2013</title>
<style>
:root{--bg:#0b1220;--panel:#111827;--card:#1f2937;--line:#334155;--txt:#f8fafc;--mut:#94a3b8;--acc:#38bdf8;--btn:#075985;--good:#22c55e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}header{position:sticky;top:0;z-index:5;background:rgba(11,18,32,.98);border-bottom:1px solid var(--line);padding:10px}h1{font-size:18px;margin:0 0 6px}.sub{font-size:12px;color:var(--mut)}.bar{display:grid;grid-template-columns:1fr 112px 112px;gap:7px;margin-top:8px}input,select,button{border:1px solid var(--line);border-radius:10px;background:#0f172a;color:var(--txt);padding:10px;font-size:14px}button{background:#12325c;border-color:#1d4ed8}.areas{display:flex;gap:6px;overflow:auto;padding-top:8px}.areas button{white-space:nowrap;padding:8px 10px;background:#111827}.areas button.on{background:#075985;border-color:#38bdf8}.main{display:grid;grid-template-columns:minmax(390px,48%) 1fr;gap:10px;padding:10px}.box{border:1px solid var(--line);background:var(--panel);border-radius:14px;overflow:hidden}.head{display:flex;justify-content:space-between;gap:8px;align-items:center;border-bottom:1px solid var(--line);padding:10px}.list{max-height:calc(100vh - 220px);overflow:auto}.row{padding:10px;border-bottom:1px solid #1f2937;cursor:pointer}.row:hover,.row.sel{background:#0e3a52}.addr{font-weight:700}.meta{color:#cbd5e1;font-size:12px;margin-top:4px;line-height:1.35}.pill{display:inline-block;padding:2px 6px;margin:3px 3px 0 0;border:1px solid var(--line);border-radius:999px;color:#cbd5e1;font-size:11px}.pager{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:8px 10px}.detail{padding:12px}.detail h2{font-size:18px;margin:0 0 8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{background:#0f172a;border:1px solid var(--line);border-radius:10px;padding:8px}.stat b{font-size:12px;color:#cbd5e1;display:block;margin-bottom:3px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.actions a,.actions button{display:inline-block;text-decoration:none;color:#fff;background:#075985;border:1px solid #38bdf8;border-radius:10px;padding:10px 12px;font-size:14px}iframe{width:100%;height:390px;border:0;border-radius:12px;background:#0f172a}@media(max-width:850px){.main{display:block}.box{margin-bottom:10px}.bar{grid-template-columns:1fr 1fr}.bar input{grid-column:1/3}.list{max-height:50vh}iframe{height:300px}}
</style>
</head>
<body>
<header><h1>HVAC Lead Map — 2009–2013</h1><div class="sub">Low home-warranty-likelihood proxy • Built 2009–2013 • Search, filter, click, navigate.</div><div class="bar"><input id="q" placeholder="Search address, owner, ZIP, city..."/><select id="year"><option value="">All years</option><option>2009</option><option>2010</option><option>2011</option><option>2012</option><option>2013</option></select><select id="sort"><option value="area">Sort: Area</option><option value="age">Sort: HVAC age</option><option value="zip">Sort: ZIP</option><option value="sq">Sort: Sq Ft</option></select></div><div class="areas" id="areas"></div></header>
<div class="main"><section class="box"><div class="head"><b id="count">Loading...</b><span class="sub">tap a lead</span></div><div class="list" id="list"></div><div class="pager"><button id="prev">Prev</button><span class="sub" id="page"></span><button id="next">Next</button></div></section><section class="box"><div class="detail" id="detail"><h2>Select a lead</h2><p class="sub">Click a house on the left, then use Navigate / Google Maps.</p></div></section></div>
<script src="data.js"></script>
<script>
const $=id=>document.getElementById(id);let area='ALL',page=0,per=100,filtered=[],selected=null;
const areaNames=['ALL',...Array.from(new Set(LEADS.map(x=>x.a))).sort((a,b)=>a.localeCompare(b))];
function shortArea(a){return a==='ALL'?'All':a.replace(/^\d+ /,'').replace(/ Phoenix$/,'').replace(/_/g,' ')}
$('areas').innerHTML=areaNames.map(a=>`<button data-a="${a}" class="${a==='ALL'?'on':''}">${shortArea(a)}</button>`).join('');
$('areas').onclick=e=>{if(e.target.tagName!=='BUTTON')return;area=e.target.dataset.a;document.querySelectorAll('.areas button').forEach(b=>b.classList.toggle('on',b.dataset.a===area));page=0;render()};
['q','year','sort'].forEach(id=>$(id).oninput=()=>{page=0;render()});
$('prev').onclick=()=>{page=Math.max(0,page-1);drawList()};$('next').onclick=()=>{page=Math.min(Math.ceil(filtered.length/per)-1,page+1);drawList()};
function render(){let q=$('q').value.trim().toLowerCase(),y=$('year').value;filtered=LEADS.filter(x=>(area==='ALL'||x.a===area)&&(!y||String(x.yr)===y)&&(!q||[x.addr,x.own,x.zip,x.city,x.apn,x.a].join(' ').toLowerCase().includes(q)));let s=$('sort').value;filtered.sort((a,b)=>s==='age'?b.age-a.age:s==='zip'?String(a.zip).localeCompare(String(b.zip)):s==='sq'?b.sq-a.sq:(a.a+a.addr).localeCompare(b.a+b.addr));$('count').textContent=`${filtered.length.toLocaleString()} leads`;drawList()}
function drawList(){let start=page*per,items=filtered.slice(start,start+per);$('page').textContent=`${filtered.length?start+1:0}-${Math.min(start+per,filtered.length)} of ${filtered.length.toLocaleString()}`;$('list').innerHTML=items.map((x,i)=>`<div class="row ${selected===x?'sel':''}" data-i="${start+i}"><div class="addr">${esc(x.addr)}</div><div class="meta">${esc(x.own||'Owner not shown')}<br><span class="pill">${x.yr}</span><span class="pill">${x.age}y if original</span><span class="pill">${esc(x.city)} ${x.zip}</span><span class="pill">${esc(shortArea(x.a))}</span></div></div>`).join('')||'<div class="row">No results</div>'}
$('list').onclick=e=>{let row=e.target.closest('.row');if(!row||row.dataset.i==null)return;selected=filtered[+row.dataset.i];drawList();detail(selected)};
function gmaps(addr){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(addr)}function nav(addr){return 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(addr)}function apple(addr){return 'http://maps.apple.com/?daddr='+encodeURIComponent(addr)}function emb(addr){return 'https://maps.google.com/maps?q='+encodeURIComponent(addr)+'&output=embed'}
function detail(x){let door=`Hey, quick question — this home looks like it was built around ${x.yr}, so if the AC is original it’s probably around ${x.age} years old. Has it been replaced yet?`; $('detail').innerHTML=`<h2>${esc(x.addr)}</h2><div class="sub">${esc(x.own||'Owner not shown')}</div><div class="actions"><a href="${nav(x.addr)}" target="_blank">Navigate</a><a href="${gmaps(x.addr)}" target="_blank">Google Maps</a><a href="${apple(x.addr)}" target="_blank">Apple Maps</a><button onclick="copy('${enc(x.addr)}')">Copy Address</button><button onclick="copy('${enc(door)}')">Copy Door Line</button></div><div class="grid"><div class="stat"><b>Build Year</b>${x.yr}</div><div class="stat"><b>HVAC Age</b>${x.age} years if original</div><div class="stat"><b>ZIP / City</b>${esc(x.city)} ${x.zip}</div><div class="stat"><b>Sq Ft</b>${Number(x.sq||0).toLocaleString()}</div><div class="stat"><b>Owner-Occupied</b>${esc(x.occ||'Estimate only')}</div><div class="stat"><b>Parcel</b>${esc(x.apn||'')}</div></div><p class="sub"><b>Warranty filter:</b> actual home warranty coverage is private. This is a public-data proxy: no recent sale + likely owner-occupied + target build year.</p><iframe src="${emb(x.addr)}"></iframe>`}
function copy(t){navigator.clipboard&&navigator.clipboard.writeText(dec(t));}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function enc(s){return encodeURIComponent(s)}function dec(s){return decodeURIComponent(s)}
render();
</script>
</body></html>
